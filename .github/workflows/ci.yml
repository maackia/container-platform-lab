name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Validate and test container stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install application dependencies
        working-directory: app
        run: npm ci

      - name: Check application syntax
        working-directory: app
        run: node --check server.js

      - name: Create environment file
        run: cp .env.example .env

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build Compose images
        run: docker compose build

      - name: Start Compose services
        run: docker compose up -d

      - name: Wait for application health
        run: |
          for i in {1..30}; do
            response="$(curl \
              --silent \
              --show-error \
              --fail \
              --connect-timeout 2 \
              --max-time 5 \
              http://localhost:8080/health 2>/dev/null || true)"

            if [ -n "$response" ]; then
              echo "$response"
              echo "Application is healthy"
              exit 0
            fi

            echo "Waiting for application... attempt ${i}/30"
            sleep 3
          done

          echo "Application did not become healthy"
          exit 1

      - name: Check application response
        run: |
          response="$(curl \
            --silent \
            --show-error \
            --fail \
            --connect-timeout 2 \
            --max-time 5 \
            http://localhost:8080/)"

          echo "$response"

          if [ -z "$response" ]; then
            echo "Application returned an empty response"
            exit 1
          fi

      - name: Wait for Prometheus readiness
        run: |
          for i in {1..30}; do
            if curl \
              --silent \
              --show-error \
              --fail \
              --connect-timeout 2 \
              --max-time 5 \
              http://localhost:9090/-/ready; then

              echo
              echo "Prometheus is ready"
              exit 0
            fi

            echo "Waiting for Prometheus... attempt ${i}/30"
            sleep 3
          done

          echo "Prometheus did not become ready"
          exit 1

      - name: Wait for Prometheus target
        run: |
          for i in {1..30}; do
            response="$(curl \
              --silent \
              --show-error \
              --fail \
              --connect-timeout 2 \
              --max-time 5 \
              'http://localhost:9090/api/v1/query?query=up%7Bjob%3D%22node_app%22%7D' \
              2>/dev/null || true)"

            echo "$response"

            if echo "$response" | grep -Eq '"value":\[[^]]*,"1"\]'; then
              echo "Prometheus target is up"
              exit 0
            fi

            echo "Waiting for Prometheus target... attempt ${i}/30"
            sleep 3
          done

          echo "Prometheus target did not become healthy"
          exit 1

      - name: Wait for Grafana health
        run: |
          for i in {1..30}; do
            response="$(curl \
              --silent \
              --show-error \
              --fail \
              --connect-timeout 2 \
              --max-time 5 \
              http://localhost:3001/api/health \
              2>/dev/null || true)"

            echo "$response"

            if echo "$response" |
              grep -Eq '"database"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "Grafana is healthy"
              exit 0
            fi

            echo "Waiting for Grafana... attempt ${i}/30"
            sleep 3
          done

          echo "Grafana did not become healthy"
          exit 1

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Stop Compose services
        if: always()
        run: docker compose down -v --remove-orphans
