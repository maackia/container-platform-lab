name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate application and containers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install application dependencies
        working-directory: app
        run: npm ci

      - name: Check JavaScript syntax
        working-directory: app
        run: node --check server.js

      - name: Create CI environment file
        run: cp .env.example .env

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for application health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health; then
              echo "Application is healthy"
              exit 0
            fi

            echo "Waiting for application... attempt ${i}/30"
            sleep 2
          done

          echo "Application health check failed"
          docker compose ps
          docker compose logs
          exit 1

      - name: Check application response
        run: curl -fsS http://localhost:8080/

      - name: Check Prometheus readiness
        run: curl -fsS http://localhost:9090/-/ready

      - name: Check Prometheus target
        run: |
                response="$(curl -fsS http://localhost:9090/api/v1/query?query=up%7Bjob%3D%22node_app%22%7D)"
                echo "$response"
                echo "$response" | grep -q '"value":\[.*,"1"\]'

      - name: Check Grafana health
        run: curl -fsS http://localhost:3001/api/health

      - name: Show service status on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v
